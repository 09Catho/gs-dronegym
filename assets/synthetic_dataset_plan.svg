<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <rect width="1600" height="980" fill="#0d1823"/>

  <text x="80" y="95" fill="#f5f8fc" font-family="Segoe UI, Arial, sans-serif" font-size="50" font-weight="700">
    Next Phase
  </text>
  <text x="80" y="150" fill="#9bd3ff" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700">
    Synthetic VLA-AN-Style Dataset Creation
  </text>
  <text x="80" y="205" fill="#b8c8d8" font-family="Segoe UI, Arial, sans-serif" font-size="28">
    Planned roadmap for turning GS-DroneGym into a dataset factory for aerial waypoint supervision
  </text>

  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="90" y="280" width="310" height="170" rx="28" fill="#173247"/>
    <text x="125" y="335" fill="#9bdcff" font-size="30" font-weight="700">1. Scene Sampling</text>
    <text x="125" y="382" fill="#f5f8fc" font-size="24">Pick a 3DGS scene</text>
    <text x="125" y="416" fill="#f5f8fc" font-size="24">and sample safe</text>
    <text x="125" y="450" fill="#f5f8fc" font-size="24">start / goal regions</text>

    <rect x="450" y="280" width="310" height="170" rx="28" fill="#1c3b32"/>
    <text x="485" y="335" fill="#99f0c3" font-size="30" font-weight="700">2. Task Synthesis</text>
    <text x="485" y="382" fill="#f5f8fc" font-size="24">Generate language</text>
    <text x="485" y="416" fill="#f5f8fc" font-size="24">instructions, task IDs,</text>
    <text x="485" y="450" fill="#f5f8fc" font-size="24">and curriculum stages</text>

    <rect x="810" y="280" width="310" height="170" rx="28" fill="#4a351f"/>
    <text x="845" y="335" fill="#ffd78e" font-size="30" font-weight="700">3. Expert Planning</text>
    <text x="845" y="382" fill="#f5f8fc" font-size="24">Create collision-aware</text>
    <text x="845" y="416" fill="#f5f8fc" font-size="24">paths and dense</text>
    <text x="845" y="450" fill="#f5f8fc" font-size="24">waypoint targets</text>

    <rect x="1170" y="280" width="340" height="170" rx="28" fill="#512b47"/>
    <text x="1205" y="335" fill="#ffb9e3" font-size="30" font-weight="700">4. Rollout + Record</text>
    <text x="1205" y="382" fill="#f5f8fc" font-size="24">Save RGB, depth, state,</text>
    <text x="1205" y="416" fill="#f5f8fc" font-size="24">instruction history, and</text>
    <text x="1205" y="450" fill="#f5f8fc" font-size="24">next-waypoint supervision</text>
  </g>

  <g stroke="#6989a4" stroke-width="8" fill="none" stroke-linecap="round">
    <path d="M400 365 H450"/>
    <path d="M760 365 H810"/>
    <path d="M1120 365 H1170"/>
  </g>

  <text x="80" y="560" fill="#9bd3ff" font-family="Segoe UI, Arial, sans-serif" font-size="36" font-weight="700">
    Planned Deliverables
  </text>

  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="110" y="610" width="400" height="220" rx="28" fill="#152432" stroke="#395670" stroke-width="3"/>
    <text x="145" y="670" fill="#9bd3ff" font-size="30" font-weight="700">A. Dataset Creator CLI</text>
    <text x="145" y="720" fill="#f5f8fc" font-size="24">Generate staged drone datasets for</text>
    <text x="145" y="754" fill="#f5f8fc" font-size="24">scene grounding, flight skills, and</text>
    <text x="145" y="788" fill="#f5f8fc" font-size="24">long-horizon navigation.</text>

    <rect x="590" y="610" width="400" height="220" rx="28" fill="#152432" stroke="#395670" stroke-width="3"/>
    <text x="625" y="670" fill="#9bd3ff" font-size="30" font-weight="700">B. Planner + Safety Labels</text>
    <text x="625" y="720" fill="#f5f8fc" font-size="24">Add expert path generation, recovery</text>
    <text x="625" y="754" fill="#f5f8fc" font-size="24">targets, and explicit safety metadata</text>
    <text x="625" y="788" fill="#f5f8fc" font-size="24">for supervised or hybrid training.</text>

    <rect x="1070" y="610" width="400" height="220" rx="28" fill="#152432" stroke="#395670" stroke-width="3"/>
    <text x="1105" y="670" fill="#9bd3ff" font-size="30" font-weight="700">C. Publication Pipeline</text>
    <text x="1105" y="720" fill="#f5f8fc" font-size="24">Export Parquet / HF datasets, create</text>
    <text x="1105" y="754" fill="#f5f8fc" font-size="24">benchmark splits, and ship dataset</text>
    <text x="1105" y="788" fill="#f5f8fc" font-size="24">cards with reproducible metrics.</text>
  </g>
</svg>
