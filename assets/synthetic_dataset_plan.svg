<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#0c1620"/>
  <text x="60" y="90" fill="#f7fbff" font-family="Segoe UI, Arial, sans-serif" font-size="46" font-weight="700">Next Phase: Synthetic VLA-AN-Style Dataset Creation</text>
  <text x="60" y="135" fill="#b6c7d7" font-family="Segoe UI, Arial, sans-serif" font-size="24">Planned roadmap for turning GS-DroneGym into a dataset factory for aerial waypoint supervision</text>

  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="70" y="210" width="210" height="120" rx="24" fill="#173247"/>
    <text x="100" y="260" fill="#9be0ff" font-size="24" font-weight="700">1. Scene Sampling</text>
    <text x="100" y="297" fill="#f7fbff" font-size="22">Pick 3DGS scene</text>
    <text x="100" y="326" fill="#f7fbff" font-size="22">and start/goal region</text>

    <rect x="330" y="210" width="210" height="120" rx="24" fill="#1f3d33"/>
    <text x="360" y="260" fill="#98f0c2" font-size="24" font-weight="700">2. Task Synthesis</text>
    <text x="360" y="297" fill="#f7fbff" font-size="22">Generate language</text>
    <text x="360" y="326" fill="#f7fbff" font-size="22">instruction + task ID</text>

    <rect x="590" y="210" width="210" height="120" rx="24" fill="#493520"/>
    <text x="620" y="260" fill="#ffd891" font-size="24" font-weight="700">3. Expert Planning</text>
    <text x="620" y="297" fill="#f7fbff" font-size="22">Create safe path</text>
    <text x="620" y="326" fill="#f7fbff" font-size="22">and dense waypoints</text>

    <rect x="850" y="210" width="270" height="120" rx="24" fill="#4b2742"/>
    <text x="880" y="260" fill="#ffb6e3" font-size="24" font-weight="700">4. Rollout + Record</text>
    <text x="880" y="297" fill="#f7fbff" font-size="22">RGB, depth, state,</text>
    <text x="880" y="326" fill="#f7fbff" font-size="22">instruction, next waypoint</text>

    <rect x="170" y="430" width="250" height="160" rx="24" fill="#152432" stroke="#35506a" stroke-width="2"/>
    <text x="205" y="480" fill="#9bd3ff" font-size="24" font-weight="700">Planned Deliverable A</text>
    <text x="205" y="520" fill="#f7fbff" font-size="22">Synthetic dataset creator CLI</text>
    <text x="205" y="555" fill="#b6c7d7" font-size="20">stage-specific exports for</text>
    <text x="205" y="583" fill="#b6c7d7" font-size="20">scene grounding, flight skills,</text>
    <text x="205" y="611" fill="#b6c7d7" font-size="20">and long-horizon navigation</text>

    <rect x="470" y="430" width="250" height="160" rx="24" fill="#152432" stroke="#35506a" stroke-width="2"/>
    <text x="505" y="480" fill="#9bd3ff" font-size="24" font-weight="700">Planned Deliverable B</text>
    <text x="505" y="520" fill="#f7fbff" font-size="22">Expert planner + safety labels</text>
    <text x="505" y="555" fill="#b6c7d7" font-size="20">collision-aware path generation</text>
    <text x="505" y="583" fill="#b6c7d7" font-size="20">plus corrective waypoint targets</text>

    <rect x="770" y="430" width="300" height="160" rx="24" fill="#152432" stroke="#35506a" stroke-width="2"/>
    <text x="805" y="480" fill="#9bd3ff" font-size="24" font-weight="700">Planned Deliverable C</text>
    <text x="805" y="520" fill="#f7fbff" font-size="22">Dataset publication pipeline</text>
    <text x="805" y="555" fill="#b6c7d7" font-size="20">Parquet / HF dataset export,</text>
    <text x="805" y="583" fill="#b6c7d7" font-size="20">splits, metrics, and benchmark cards</text>
  </g>

  <g stroke="#5d7c96" stroke-width="6" fill="none" stroke-linecap="round">
    <path d="M280 270 H330"/>
    <path d="M540 270 H590"/>
    <path d="M800 270 H850"/>
  </g>
</svg>
